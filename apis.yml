aid: wati
name: WATI
description: >-
  WATI is an official WhatsApp Business Platform that provides a shared team
  inbox, no-code chatbot builder, broadcast campaigns, and CRM integrations
  for businesses communicating with customers over WhatsApp. The platform
  offers a tenant-scoped REST API for sending template and session messages,
  managing contacts, and integrating with external systems. WATI APIs use
  Bearer token authentication tied to each customer's WATI workspace.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
  - WhatsApp
  - Messaging
  - Customer Engagement
  - Chatbot
  - Business Communication
  - CRM
url: >-
