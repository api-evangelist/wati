created: '2026-05-11'
modified: '2026-05-19'
specificationVersion: '0.19'
apis:
  - aid: wati:whatsapp-api
    name: WATI WhatsApp Business API
    description: >-
      Tenant-scoped REST API for sending WhatsApp template and session
      messages, managing contacts, assigning operators, and orchestrating
      chatbot flows. Uses Bearer token authentication with per-workspace
      endpoint URLs (live-server-<id>.wati.io or live-mt-server.wati.io).
    humanURL: https://docs.wati.io/reference/introduction
    baseURL: https://live-mt-server.wati.io
    tags:
      - WhatsApp
      - Messaging
      - Chatbot
    properties:
      - type: Documentation
        url: https://docs.wati.io/reference/introduction
      - type: Authentication
        url: https://docs.wati.io/reference/authentication

